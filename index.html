<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology_W3B | Explora la Vida</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <nav id="global-nav" style="opacity: 0; pointer-events: none; transition: opacity 0.8s ease;"></nav>
    <main class="hero">
        <div id="earth-container"></div>
        <div id="intro-overlay" class="intro-overlay">
            <div class="intro-content">
                <div class="badge">BIOLOGÍA 3D</div>
                <h1>Explora la Vida en la Tierra</h1>
                <p>Descubre la biodiversidad, la anatomía y los ecosistemas de nuestro planeta a través de una experiencia interactiva inmersiva.</p>
                <div class="overlay-actions">
                    <button class="btn-start pulse" onclick="startExploration()">
                        <i class="fas fa-play"></i> Empezar Exploración
                    </button>
                </div>
            </div>
        </div>
        <div id="country-info-panel" class="floating-info">
            <h3 id="country-name"><i class="fas fa-map-marker-alt"></i> Selecciona una Región</h3>
            <div id="ecosystems">
                <p style="color: var(--text-dim);">Haz clic en las regiones verdes del globo para explorar la biodiversidad de Colombia.</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        function startExploration() {
            const overlay = document.getElementById('intro-overlay');
            const nav = document.getElementById('global-nav');
            const panel = document.getElementById('country-info-panel');
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            overlay.style.transform = 'scale(1.1)';
            overlay.style.transition = 'all 1s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => { overlay.style.display = 'none'; }, 1000);
            nav.style.opacity = '1';
            nav.style.pointerEvents = 'auto';
            panel.style.display = 'block';
            panel.style.animation = 'fadeIn 1.2s forwards 0.5s';
        }
    </script>
</body>
</html>
