<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology_W3B | Explora la Vida</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <nav id="global-nav">
        <!-- Injected via components.js -->
    </nav>

    <main class="hero">
        <div id="earth-container"></div>
        
        <div class="hero-content">
            <h1 class="pulse">Biology Explorer</h1>
            <p>Descubre los misterios de la vida, desde el ADN hasta los ecosistemas globales. Interactúa con nuestro globo terráqueo para explorar la biodiversidad.</p>
            <div style="margin-top: 30px; pointer-events: auto;">
                <button class="btn btn-primary" onclick="scrollToGlobe()">
                    <i class="fas fa-play"></i> Empezar Exploración
                </button>
            </div>
        </div>

        <!-- Info Panel for Globe Interactivity -->
        <div id="country-info-panel" class="floating-info">
            <h3 id="country-name">Selecciona una Región</h3>
            <div id="ecosystems">
                <p style="color: var(--text-dim);">Haz clic en las fronteras verdes del globo para ver detalles de biodiversidad.</p>
            </div>
        </div>
    </main>

    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        function scrollToGlobe() {
            // Hide the hero text to focus on globe
            document.querySelector('.hero-content').style.opacity = '0';
            document.querySelector('.hero-content').style.pointerEvents = 'none';
            document.querySelector('.hero-content').style.transition = 'opacity 0.8s ease';
            
            // Highlight interaction
            const panel = document.getElementById('country-info-panel');
            panel.style.display = 'block';
            panel.style.animation = 'fadeIn 1s forwards';
        }
    </script>
</body>
</html>
