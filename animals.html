<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Animal | Biology Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body>

    <nav id="global-nav">
        <!-- Injected via components.js -->
    </nav>

    <header class="hero" style="height: 40vh; min-height: 300px;">
        <div class="hero-content">
            <h1>Mundo Animal</h1>
            <p>Desde las profundidades del océano hasta las cimas de las montañas.</p>
            <div style="margin-top: 20px; pointer-events: auto;">
                <input type="text" id="search-input" placeholder="Buscar animal o grupo..." 
                       style="padding: 12px 25px; border-radius: 50px; border: 1px solid var(--glass-border); 
                              background: rgba(255,255,255,0.05); color: #fff; width: 300px; outline: none; transition: 0.3s;">
            </div>
        </div>
    </header>

    <main class="content-grid" id="bio-container">
        <!-- Bio cards injected via master.js -->
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('detail-modal')">&times;</span>
            <h2 id="modal-title" style="color: var(--primary); margin-bottom: 20px;"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="components.js"></script>
    <script src="master.js"></script>
</body>
</html>
