<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regiones de Colombia | Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        .region-card-hero {
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1594916327341-38f3769c9b4e?q=80&w=1200');
            background-size: cover;
            background-position: center;
            text-align: center;
        }
        .info-section {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .info-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .stat-badge {
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            display: inline-block;
            margin: 5px;
        }
    </style>
</head>
<body>

    <nav id="global-nav"></nav>

    <header class="region-card-hero">
        <div class="hero-content">
            <h1 id="region-title">Cargando Región...</h1>
            <p id="region-subtitle">Explora la biodiversidad de Colombia</p>
        </div>
    </header>

    <main style="max-width: 900px; margin: -50px auto 60px; padding: 0 20px; position: relative; z-index: 100;">
        <div class="info-section">
            <h3><i class="fas fa-mountain"></i> Ecosistemas y Paisajes</h3>
            <p id="ecosystems-text" style="color: var(--text-dim); line-height: 1.8;"></p>
        </div>

        <div class="grid-columns">
            <div class="info-section">
                <h3><i class="fas fa-paw"></i> Fauna (Animales)</h3>
                <div id="fauna-list"></div>
            </div>
            <div class="info-section">
                <h3><i class="fas fa-leaf"></i> Flora (Plantas)</h3>
                <div id="flora-list"></div>
            </div>
        </div>

        <div class="info-section">
            <h3><i class="fas fa-city"></i> Ciudades Principales</h3>
            <div id="cities-list" style="display:flex; flex-wrap:wrap;"></div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Volver al Mapa</a>
        </div>
    </main>

    <script src="components.js"></script>
    <script>
        const REGIONES_COL = {
            'andina': {
                nombre: 'Región Andina',
                clima: 'Templado a Frío',
                ecosistemas: 'Es el corazón montañoso de Colombia. Aquí encontramos los Páramos, que son fábricas de agua donde nacen los ríos. También hay bosques de niebla y hermosos valles donde se cultiva el mejor café del mundo.',
                fauna: ['Cóndor de los Andes', 'Oso de Anteojos', 'Colibrí de Páramo', 'Danta de Montaña'],
                flora: ['Frailejón', 'Palma de Cera', 'Orquídeas', 'Cedro'],
                ciudades: ['Bogotá (Capital)', 'Medellín', 'Cali', 'Manizales', 'Bucaramanga']
            },
            'caribe': {
                nombre: 'Región Caribe',
                ecosistemas: 'Playas doradas, manglares y la Sierra Nevada de Santa Marta (la montaña costera más alta del mundo!). Hay desiertos al norte y selvas secas al sur.',
                fauna: ['Flamencos Rosados', 'Manatí del Caribe', 'Iguana', 'Tirri-Tirri'],
                flora: ['Cactus', 'Palma de Coco', 'Mangle Rojo', 'Caoba'],
                ciudades: ['Cartagena', 'Barranquilla', 'Santa Marta', 'Montería']
            },
            'amazonica': {
                nombre: 'Región Amazónica',
                ecosistemas: 'El pulmón del mundo! Una selva tropical gigante cruzada por el río más largo. Es el lugar con más especies de plantas y animales del planeta.',
                fauna: ['Delfín Rosado', 'Jaguar', 'Guacamaya Macuira', 'Pirarucú (pez gigante)'],
                flora: ['Victoria Amazónica (loto gigante)', 'Caucho', 'Seje', 'Acai'],
                ciudades: ['Leticia', 'Florencia', 'Mocoa', 'Mitú']
            },
            'pacifica': {
                nombre: 'Región Pacífica',
                ecosistemas: 'Una de las zonas donde más llueve en el mundo! Selvas muy húmedas que tocan el mar y espectaculares arrecifes de coral.',
                fauna: ['Ballena Jorobada', 'Rana Dorada Venenosa', 'Tortuga Golfina', 'Olinguito'],
                flora: ['Palma Naidí', 'Corozo', 'Balsa', 'Guayacán'],
                ciudades: ['Quibdó', 'Buenaventura', 'Guapi', 'Tumaco']
            },
            'orinoquia': {
                nombre: 'Región Orinoquía',
                ecosistemas: 'Llanuras infinitas (los Llanos Orientales). Es el país de los atardecereres rojos, sabanas que se inundan y ríos llenos de vida.',
                fauna: ['Chigüiro (el roedor más grande)', 'Garza Corocora', 'Venado Sabanero', 'Anaconda'],
                flora: ['Palma de Moriche', 'Pasto de Sabana', 'Cucharo', 'Yarumo'],
                ciudades: ['Villavicencio', 'Yopal', 'Arauca', 'Puerto Carreño']
            },
            'insular': {
                nombre: 'Región Insular',
                ecosistemas: 'Islas mágicas rodeadas del "Mar de los siete colores". Barreras de coral llenas de vida marina y playas de arena blanca.',
                fauna: ['Lagartija Azul', 'Fragatas', 'Peces Loro', 'Cangrejo Negro'],
                flora: ['Árbol del Pan', 'Coco', 'Uva de Playa', 'Mangle'],
                ciudades: ['San Andrés', 'Providencia', 'Santa Catalina']
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const regionKey = params.get('region') || 'andina';
            const data = REGIONES_COL[regionKey];

            if (data) {
                document.getElementById('region-title').textContent = data.nombre;
                document.getElementById('ecosystems-text').textContent = data.ecosistemas;
                
                const faunaList = document.getElementById('fauna-list');
                data.fauna.forEach(f => {
                    const b = document.createElement('span');
                    b.className = 'stat-badge';
                    b.innerHTML = `<i class="fas fa-paw"></i> ${f}`;
                    faunaList.appendChild(b);
                });

                const floraList = document.getElementById('flora-list');
                data.flora.forEach(f => {
                    const b = document.createElement('span');
                    b.className = 'stat-badge';
                    b.style.color = '#34d399';
                    b.innerHTML = `<i class="fas fa-leaf"></i> ${f}`;
                    floraList.appendChild(b);
                });

                const citiesList = document.getElementById('cities-list');
                data.ciudades.forEach(c => {
                    const b = document.createElement('span');
                    b.className = 'stat-badge';
                    b.style.background = 'rgba(255,255,255,0.05)';
                    b.style.color = '#94a3b8';
                    b.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${c}`;
                    citiesList.appendChild(b);
                });
            }
        });
    </script>
</body>
</html>
