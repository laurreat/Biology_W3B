<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regiones de Colombia | Biology_W3B</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .region-hero {
            position: relative;
            height: 55vh;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .region-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) saturate(1.3);
            transform: scale(1.05);
            transition: background-image 0.5s ease;
        }
        .region-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10,11,16,0.2) 0%, rgba(10,11,16,0.85) 100%);
        }
        .region-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 0 24px;
        }
        .region-hero-content .region-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: var(--radius-full);
            background: var(--primary-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .region-hero-content h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.15;
            margin-bottom: 12px;
        }
        .region-hero-content p {
            font-size: 1.15rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .region-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }
        .region-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        .region-stat {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
        }
        .region-stat i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .region-stat .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            display: block;
            margin-bottom: 4px;
        }
        .region-stat .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .region-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 30px;
        }
        .region-section h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .region-section h2 i {
            color: var(--primary);
        }
        .region-section p {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .region-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all 0.25s var(--transition);
        }
        .region-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .region-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .region-card-body {
            padding: 16px;
        }
        .region-card-body h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 6px;
        }
        .region-card-body p {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin: 0;
            line-height: 1.5;
        }
        .species-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .species-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .species-badge.fauna {
            background: var(--accent-red-bg);
            color: var(--accent-red-text);
        }
        .species-badge.flora {
            background: var(--primary-bg);
            color: var(--primary);
        }
        .species-badge.city {
            background: var(--accent-blue-bg);
            color: var(--accent-blue-text);
        }
        .species-badge i {
            font-size: 0.75rem;
        }
        .region-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            background: var(--primary-bg);
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 20px;
        }
        .region-back:hover {
            background: var(--primary-bg-hover);
            transform: translateX(-3px);
        }
        @media (max-width: 600px) {
            .region-hero { height: 40vh; min-height: 280px; }
            .region-stats { grid-template-columns: repeat(2, 1fr); }
            .region-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>

    <div class="region-hero">
        <div class="region-hero-bg" id="region-bg"></div>
        <div class="region-hero-overlay"></div>
        <div class="region-hero-content">
            <span class="region-badge"><i class="fas fa-map-marked-alt"></i> Colombia</span>
            <h1 id="region-title">Cargando...</h1>
            <p id="region-subtitle"></p>
        </div>
    </div>

    <div class="region-body">
        <div class="region-stats" id="region-stats"></div>
        <div id="region-content"></div>
        <a href="index.html" class="region-back"><i class="fas fa-arrow-left"></i> Volver al Globo</a>
    </div>

    <script src="components.js"></script>
    <script>
        const REGIONES = {
            'andina': {
                nombre: 'Región Andina',
                subtitle: 'El corazón montañoso de Colombia, donde tres cordilleras se encuentran',
                bg: 'https://images.unsplash.com/photo-1568402102990-bc541580b59f?q=80&w=1200',
                stats: [
                    { icon: 'fa-mountain', value: '3', label: 'Cordilleras' },
                    { icon: 'fa-temperature-low', value: '4-24°C', label: 'Clima' },
                    { icon: 'fa-users', value: '70%', label: 'Población del país' },
                    { icon: 'fa-water', value: '200+', label: 'Ríos' }
                ],
                description: 'La Región Andina es la más poblada de Colombia. Abarca las tres cordilleras de los Andes (Occidental, Central y Oriental) y sus valles interandinos. Aquí se encuentra la sabana de Bogotá, el Valle del Cauca y los principales centros urbanos del país. Los páramos de esta región, como Sumapaz y Chingaza, son las principales fuentes de agua para millones de personas.',
                ecosystems: 'Páramo, bosque andino, bosque de niebla, valle interandino y altiplano cundiboyacense. Los páramos son ecosistemas únicos en el mundo que solo existen en pocos lugares del planeta y cumplen la función vital de captar y almacenar agua de la neblina.',
                fauna: [
                    { name: 'Cóndor de los Andes', desc: 'El ave voladora más grande del mundo, con una envergadura de hasta 3.3 metros. Símbolo de Colombia.' },
                    { name: 'Oso de Anteojos', desc: 'Único oso de Sudamérica. Vive en bosques de niebla entre 500 y 4.000 metros de altitud.' },
                    { name: 'Colibrí Picoespada', desc: 'Endémico de los páramos colombianos. Su pico mide más que su propio cuerpo.' },
                    { name: 'Danta de Montaña', desc: 'El mamífero terrestre más grande de Colombia, en peligro crítico de extinción.' }
                ],
                flora: [
                    { name: 'Frailejón', desc: 'Planta emblemática de los páramos. Crece solo 1 cm por año y puede vivir más de 100 años.' },
                    { name: 'Palma de Cera', desc: 'Árbol nacional de Colombia. Puede alcanzar 60 metros de altura en el Valle de Cocora.' },
                    { name: 'Orquídea', desc: 'Colombia tiene más de 4.270 especies de orquídeas, la mayor diversidad del mundo.' },
                    { name: 'Sietecueros', desc: 'Árbol sagrado para los pueblos indígenas andinos. Su corteza tiene propiedades medicinales.' }
                ],
                cities: ['Bogotá D.C.', 'Medellín', 'Cali', 'Bucaramanga', 'Manizales', 'Pereira', 'Armenia', 'Tunja', 'Neiva', 'Ibagué']
            },
            'caribe': {
                nombre: 'Región Caribe',
                subtitle: 'Donde la Sierra Nevada toca el mar y los flamencos pintan las lagunas de rosa',
                bg: 'https://images.unsplash.com/photo-1583531172005-814194423e07?q=80&w=1200',
                stats: [
                    { icon: 'fa-sun', value: '28-35°C', label: 'Temperatura' },
                    { icon: 'fa-umbrella-beach', value: '1.800 km', label: 'Costa' },
                    { icon: 'fa-tree', value: '5', label: 'Parques Nacionales' },
                    { icon: 'fa-fish', value: '1.200+', label: 'Especies marinas' }
                ],
                description: 'La Región Caribe abarca el norte de Colombia, entre el mar Caribe y la Sierra Nevada de Santa Marta. Incluye desde playas paradisíacas y arrecifes de coral hasta el desierto de La Guajira y los manglares del Golfo de Morrosquillo. Es una de las regiones con mayor diversidad cultural del país, con influencias indígenas, africanas y europeas.',
                ecosystems: 'Playas y arrecifes de coral, manglares, bosque seco tropical, desierto (La Guajira), ciénagas y la Sierra Nevada de Santa Marta — la montaña costera más alta del mundo con 5.775 metros, donde se encuentran todos los pisos térmicos desde el nivel del mar hasta nieves perpetuas.',
                fauna: [
                    { name: 'Flamenco Caribeño', desc: 'Habita en la Serranía del Perijá y los flamencos de Manaure. Su color rosado viene de los crustáceos que come.' },
                    { name: 'Manatí del Caribe', desc: 'Mamífero acuático herbívoro en peligro de extinción. Puede medir hasta 4 metros.' },
                    { name: 'Iguana Verde', desc: 'Reptil común en la región. Puede cambiar de tonalidad según la temperatura y su estado de ánimo.' },
                    { name: 'Tití Cabeciblanco', desc: 'Primate endémico de la costa Caribe colombiana, uno de los más pequeños y amenazados del mundo.' }
                ],
                flora: [
                    { name: 'Palma de Coco', desc: 'Presente en las islas y costas. De ella se obtiene aceite, agua y fibra.' },
                    { name: 'Mangle Rojo', desc: 'Árbol fundamental para los ecosistemas costeros. Protege la costa de la erosión.' },
                    { name: 'Cactus Cardón', desc: 'Típico del desierto de La Guajira. Puede almacenar grandes cantidades de agua.' },
                    { name: 'Ceiba', desc: 'Árbol sagrado para muchas culturas. Puede vivir más de 500 años y alcanzar 40 metros.' }
                ],
                cities: ['Cartagena', 'Barranquilla', 'Santa Marta', 'Montería', 'Sincelejo', 'Riohacha', 'Valledupar', 'Cartagena']
            },
            'amazonica': {
                nombre: 'Región Amazónica',
                subtitle: 'El pulmón del mundo: la selva tropical más grande y biodiversa del planeta',
                bg: 'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1200',
                stats: [
                    { icon: 'fa-tree', value: '350.000 km²', label: 'Selva en Colombia' },
                    { icon: 'fa-temperature-high', value: '25-30°C', label: 'Temperatura' },
                    { icon: 'fa-droplet', value: '3.000 mm', label: 'Lluvia anual' },
                    { icon: 'fa-paw', value: '2.500+', label: 'Especies de peces' }
                ],
                description: 'La Amazonía colombiana cubre el sur del país y es parte del bosque tropical más grande del mundo. Aquí nace el río Amazonas, el más caudaloso del planeta. La región alberga una biodiversidad incomparable: más especies de plantas, animales e insectos que cualquier otro lugar. Comunidades indígenas como los Tikuna, Huitoto y Yucuna mantienen viva su cultura ancestral.',
                ecosystems: 'Selva tropical húmeda, bosques de igapó (inundados), varzeas, tepuyes y ríos de aguas negras como el río Negro. La selva amazónica produce el 20% del oxígeno mundial y regula el clima de todo el planeta.',
                fauna: [
                    { name: 'Delfín Rosado', desc: 'El delfín de agua dulce más grande del mundo. Puede medir hasta 2.5 metros y es símbolo de la Amazonía.' },
                    { name: 'Jaguar', desc: 'El felino más grande de América. Puede pesar hasta 120 kg y es un excelente nadador.' },
                    { name: 'Guacamayo Rojo', desc: 'Ave colorida que habita en la copa de los árboles más altos de la selva.' },
                    { name: 'Pirarucú', desc: 'Uno de los peces de agua dulce más grandes del mundo, puede alcanzar 3 metros de largo.' }
                ],
                flora: [
                    { name: 'Victoria Amazónica', desc: 'La hoja de nenúfar más grande del mundo, puede medir hasta 3 metros de diámetro y soportar hasta 50 kg.' },
                    { name: 'Árbol de Caucho', desc: 'De su látex se obtiene la goma natural. Fue la base de la economía amazónica en el siglo XIX.' },
                    { name: 'Palma de Seje', desc: 'Fuente de alimento para comunidades indígenas. Su fruto produce aceite rico en nutrientes.' },
                    { name: 'Açaí', desc: 'Palma cuyo fruto es un superalimento rico en antioxidantes, consumido en todo el mundo.' }
                ],
                cities: ['Leticia', 'Puerto Nariño', 'Florencia', 'Mocoa', 'Mitú', 'San José del Guaviare']
            },
            'pacifica': {
                nombre: 'Región Pacífica',
                subtitle: 'La región más lluviosa del planeta, donde la selva se encuentra con el océano',
                bg: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200',
                stats: [
                    { icon: 'fa-cloud-rain', value: '10.000 mm', label: 'Lluvia anual' },
                    { icon: 'fa-water', value: '1.300 km', label: 'Costa Pacífica' },
                    { icon: 'fa-frog', value: '250+', label: 'Especies de ranas' },
                    { icon: 'fa-leaf', value: '75%', label: 'Bosque natural' }
                ],
                description: 'El Chocó Biogeográfico es una de las regiones más biodiversas y lluviosas del planeta. Se extiende desde Panamá hasta Ecuador a lo largo de la costa Pacífica colombiana. Aquí las ballenas jorobadas vienen cada año desde la Antártida para reproducirse en sus aguas cálidas. La región tiene una riqueza cultural afrocolombiana e indígena extraordinaria.',
                ecosystems: 'Selva pluvial tropical, manglares del Pacífico, arrecifes de coral, estuarios y bosques de galería. Es el hotspot de biodiversidad más importante de Colombia y uno de los cinco más importantes del mundo.',
                fauna: [
                    { name: 'Ballena Jorobada', desc: 'Viaja 8.000 km desde la Antártida cada año para reproducirse en las cálidas aguas del Pacífico colombiano (junio-octubre).' },
                    { name: 'Rana Dorada', desc: 'Endémica de la región. Su color brillante advierte a los depredadores que es venenosa.' },
                    { name: 'Tortuga Carey', desc: 'En peligro crítico de extinción. Anida en las playas del Pacífico colombiano.' },
                    { name: 'Olinguito', desc: 'El mamífero más pequeño de la familia de los mapaches, descubierto en 2013 en los Andes del Pacífico.' }
                ],
                flora: [
                    { name: 'Palma Naidí', desc: 'Palma endémica del Chocó. Sus frutos son alimento esencial para muchas especies de aves.' },
                    { name: 'Guayacán', desc: 'Árbol de madera preciosa que florece con flores amarillas espectaculares. Puede vivir 200 años.' },
                    { name: 'Balsa', desc: 'Árbol de crecimiento rápido con la madera más ligera del mundo. Es fundamental para la sucesión ecológica.' },
                    { name: 'Corozo', desc: 'Palma cuyos frutos son consumidos por animales y comunidades locales. Crece en zonas húmedas.' }
                ],
                cities: ['Quibdó', 'Buenaventura', 'Tumaco', 'Guapi', 'Istmina', 'Bahía Solano']
            },
            'orinoquia': {
                nombre: 'Región Orinoquía',
                subtitle: 'Los inmensos Llanos Orientales donde el cielo se encuentra con la sabana',
                bg: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1200',
                stats: [
                    { icon: 'fa-sun', value: '25-35°C', label: 'Temperatura' },
                    { icon: 'fa-expand', value: '260.000 km²', label: 'Extensión' },
                    { icon: 'fa-cow', value: '12M+', label: 'Cabezas de ganado' },
                    { icon: 'fa-feather', value: '600+', label: 'Especies de aves' }
                ],
                description: 'Los Llanos Orientales son extensas sabanas que se extienden desde los piedemontes andinos hasta el río Orinoco. Es la tierra de los llaneros, los jinetes colombianos que mantienen una cultura única de música, poesía y trabajo con el ganado. Los ríos de esta región, como el Meta, el Vichada y el Guaviare, son de los más caudalosos de Colombia.',
                ecosystems: 'Sabana natural, bosque de galería (a lo largo de los ríos), morichales, esteros y el escudo guayanés al sureste. En época de lluvias gran parte de la sabana se inunda, creando humedales de gran importancia ecológica.',
                fauna: [
                    { name: 'Chigüiro', desc: 'El roedor más grande del mundo, puede pesar hasta 65 kg. Vive en grupos cerca de ríos y lagunas.' },
                    { name: 'Garza Corocora', desc: 'Ave de plumaje rojo intenso que habita en las sabanas inundables. Símbolo de los Llanos.' },
                    { name: 'Venado Sabanero', desc: 'Ciervo adaptado a las sabanas abiertas. Puede correr a gran velocidad para escapar de depredadores.' },
                    { name: 'Anaconda Verde', desc: 'Una de las serpientes más grandes del mundo, puede medir hasta 8 metros. Habita en ríos y ciénagas.' }
                ],
                flora: [
                    { name: 'Palma de Moriche', desc: 'Palma emblemática de los llanos. Crece en zonas inundadas y es fuente de alimento para animales y personas.' },
                    { name: 'Pasto de Sabana', desc: 'Cobertura vegetal dominante. Se renueva con las quemas naturales de la estación seca.' },
                    { name: 'Cucharo', desc: 'Árbol de los bosques de galería llaneros. Su madera es utilizada en construcciones rurales.' },
                    { name: 'Samán', desc: 'Árbol majestuoso de copa amplia que proporciona sombra en las sabanas. Puede vivir más de 300 años.' }
                ],
                cities: ['Villavicencio', 'Yopal', 'Arauca', 'Puerto Carreño', 'Tame', 'Inírida']
            },
            'insular': {
                nombre: 'Región Insular',
                subtitle: 'Islas de ensueño en el "Mar de los siete colores" y el Pacífico',
                bg: 'https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?q=80&w=1200',
                stats: [
                    { icon: 'fa-water', value: '27°C', label: 'Temp. del mar' },
                    { icon: 'fa-fish', value: '500+', label: 'Especies de peces' },
                    { icon: 'fa-umbrella-beach', value: '15+', label: 'Islas e islotes' },
                    { icon: 'fa-anchor', value: '2', label: 'Océanos (Atlántico y Pacífico)' }
                ],
                description: 'La Región Insular de Colombia incluye las islas del archipiélago de San Andrés, Providencia y Santa Catalina en el mar Caribe, así como la Isla Gorgona en el Pacífico. San Andrés es famosa por su "Mar de los siete colores" y sus arrecifes de coral, parte de la tercera barrera de coral más grande del mundo. Gorgona, conocida como "la isla de la ciencia", fue una prisión y hoy es un parque natural.',
                ecosystems: 'Arrecifes de coral, cayos, manglares, playas de arena blanca, bosques tropicales insulares y el Parque Natural Gorgona en el Pacífico — la antigua "isla prisión" que hoy alberga una de las selvas más biodiversas del Pacífico americano.',
                fauna: [
                    { name: 'Cangrejo Ermitaño', desc: 'Habita en las playas de San Andrés. Usa conchas vacías como protección y cambia a una más grande a medida que crece.' },
                    { name: 'Fragata', desc: 'Ave marina con una envergadura de hasta 2.3 metros. Los machos inflan su bolsa roja para atraer parejas.' },
                    { name: 'Pez Loro', desc: 'Pez colorido de los arrecifes. Es fundamental para la salud del coral porque se alimenta de algas.' },
                    { name: 'Tortuga Verde', desc: 'Llega a las playas de Providencia para anidar. Puede vivir más de 80 años y recorrer miles de kilómetros.' }
                ],
                flora: [
                    { name: 'Árbol del Pan', desc: 'Introducido a las islas, produce frutos grandes y nutritivos que son base de la alimentación local.' },
                    { name: 'Palma de Coco', desc: 'Símbolo del Caribe. De ella se obtiene coco, aceite, fibra y madera.' },
                    { name: 'Uva de Playa', desc: 'Planta rastrera que crece en las arenas de las playas. Ayuda a fijar la arena y proteger la costa.' },
                    { name: 'Heliconia', desc: 'Planta tropical con flores espectaculares en rojo, naranja y amarillo. Atrae colibríes.' }
                ],
                cities: ['San Andrés', 'Providencia', 'Santa Catalina', 'Isla Gorgona', 'Isla Malpelo']
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('region') || 'andina';
            const data = REGIONES[key];

            if (!data) {
                document.getElementById('region-title').textContent = 'Región no encontrada';
                return;
            }

            document.getElementById('region-title').textContent = data.nombre;
            document.getElementById('region-subtitle').textContent = data.subtitle;
            document.getElementById('region-bg').style.backgroundImage = `url('${data.bg}')`;

            const statsEl = document.getElementById('region-stats');
            statsEl.innerHTML = data.stats.map(s => `
                <div class="region-stat">
                    <i class="fas ${s.icon}"></i>
                    <span class="stat-value">${s.value}</span>
                    <span class="stat-label">${s.label}</span>
                </div>
            `).join('');

            const contentEl = document.getElementById('region-content');
            contentEl.innerHTML = `
                <div class="region-section">
                    <h2><i class="fas fa-info-circle"></i> Sobre esta región</h2>
                    <p>${data.description}</p>
                </div>

                <div class="region-section">
                    <h2><i class="fas fa-mountain"></i> Ecosistemas</h2>
                    <p>${data.ecosystems}</p>
                </div>

                <div class="region-section">
                    <h2><i class="fas fa-paw"></i> Fauna Destacada</h2>
                    <div class="region-grid">
                        ${data.fauna.map(f => `
                            <div class="region-card">
                                <div class="region-card-body">
                                    <h3>${f.name}</h3>
                                    <p>${f.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="species-list">
                        ${data.fauna.map(f => `<span class="species-badge fauna"><i class="fas fa-paw"></i> ${f.name}</span>`).join('')}
                    </div>
                </div>

                <div class="region-section">
                    <h2><i class="fas fa-leaf"></i> Flora Destacada</h2>
                    <div class="region-grid">
                        ${data.flora.map(f => `
                            <div class="region-card">
                                <div class="region-card-body">
                                    <h3>${f.name}</h3>
                                    <p>${f.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="species-list">
                        ${data.flora.map(f => `<span class="species-badge flora"><i class="fas fa-leaf"></i> ${f.name}</span>`).join('')}
                    </div>
                </div>

                <div class="region-section">
                    <h2><i class="fas fa-city"></i> Ciudades Principales</h2>
                    <div class="species-list">
                        ${data.cities.map(c => `<span class="species-badge city"><i class="fas fa-map-marker-alt"></i> ${c}</span>`).join('')}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
