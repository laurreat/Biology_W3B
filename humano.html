<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía | Biology Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav id="global-nav">
        <!-- Injected via components.js -->
    </nav>

    <header class="hero" style="height: 40vh; min-height: 300px;">
        <div class="hero-content">
            <h1>Cuerpo Humano</h1>
            <p>Explora la maravilla de la ingeniería biológica que nos mantiene vivos.</p>
            <div style="margin-top: 20px; pointer-events: auto;">
                <input type="text" id="search-input" placeholder="Buscar sistema... (e.g. Digestivo)" 
                       style="padding: 12px 25px; border-radius: 50px; border: 1px solid var(--glass-border); 
                              background: rgba(255,255,255,0.05); color: #fff; width: 300px; outline: none; transition: 0.3s;">
            </div>
        </div>
    </header>

    <main class="content-grid" id="bio-container">
        <!-- Bio cards injected via JS -->
    </main>

    <button class="btn btn-primary pulse" id="open-exam" style="position: fixed; bottom: 30px; right: 30px; z-index: 1000; padding: 15px 30px; border-radius: 50px;">
        <i class="fas fa-edit"></i> Realizar Examen
    </button>

    <!-- Content Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('detail-modal')">&times;</span>
            <h2 id="modal-title" style="color: var(--primary); margin-bottom: 20px;"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Exam Modal -->
    <div id="exam-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('exam-modal')">&times;</span>
            <h2>Evaluación Anatomía</h2>
            <form id="exam-form" style="margin-top: 20px;"></form>
            <div id="exam-results" style="margin-top: 20px;"></div>
            <button class="btn btn-primary" id="submit-exam" style="width: 100%; margin-top: 20px;">Enviar Respuestas</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bio-container');
            const searchInput = document.getElementById('search-input');
            const openExamBtn = document.getElementById('open-exam');

            function renderCards(filter = '') {
                container.innerHTML = '';
                const filtered = BIOLOGY_DATA.humano.filter(item => 
                    item.title.toLowerCase().includes(filter.toLowerCase()) || 
                    item.category.toLowerCase().includes(filter.toLowerCase())
                );
                
                filtered.forEach(item => {
                    const card = createBioCard({
                        ...item,
                        onClick: () => showDetails(item)
                    });
                    container.appendChild(card);
                });
            }

            function showDetails(item) {
                document.getElementById('modal-title').textContent = item.title;
                document.getElementById('modal-body').innerHTML = item.details;
                showModal('detail-modal');
            }

            searchInput.addEventListener('input', (e) => renderCards(e.target.value));

            openExamBtn.addEventListener('click', () => {
                const form = document.getElementById('exam-form');
                form.innerHTML = '';
                
                let qIndex = 0;
                BIOLOGY_DATA.humano.forEach(system => {
                    system.questions?.forEach(q => {
                        const qDiv = document.createElement('div');
                        qDiv.className = 'info-stat';
                        qDiv.style.marginBottom = '20px';
                        qDiv.innerHTML = `
                            <strong>${system.title}</strong>
                            <p style="margin-bottom:10px;">${q.q}</p>
                            ${q.options.map((opt, i) => `
                                <label style="display:block; margin-bottom:5px; cursor:pointer;">
                                    <input type="radio" name="q${qIndex}" value="${i}"> ${opt}
                                </label>
                            `).join('')}
                        `;
                        form.appendChild(qDiv);
                        qIndex++;
                    });
                });
                
                showModal('exam-modal');
            });

            document.getElementById('submit-exam').addEventListener('click', () => {
                // Simplified result checking
                alert('¡Examen enviado! Tu puntaje aparecerá en la siguiente versión.');
                closeModal('exam-modal');
            });

            renderCards();
        });
    </script>
</body>
</html>
